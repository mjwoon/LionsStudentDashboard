services:
  # 1. Database: 벡터 검색(pgvector)을 지원하는 PostgreSQL
  db:
    image: pgvector/pgvector:pg16
    container_name: fullstack_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: my_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. Redis: AI 요청 처리를 위한 비동기 메시지 브로커
  redis:
    image: redis:7-alpine
    container_name: fullstack_redis
    ports:
      - "6380:6379"

  # 3. Backend: FastAPI (uv 기반)
  backend:
    build: ./backend
    container_name: fastapi_backend
    volumes:
      - ./backend:/app
      - /app/.venv
      # AI 모델 공유 볼륨은 주석 처리 (backend의 models 패키지와 충돌)
      # - ./models:/app/models
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql+psycopg://user:password@db:5432/my_db
      REDIS_URL: redis://redis:6379/0
      OLLAMA_HOST: http://ollama:11434
      # Neo4j Graph DB 설정
      NEO4J_URI: bolt://neo4j-course-graph:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password123
      # OpenAI API (AI 총평)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    depends_on:
      - db
      - redis
      - neo4j
    networks:
      - default
      - course-graph-network

  neo4j:
    image: neo4j:latest
    container_name: neo4j-course-graph
    ports:
      - "7474:7474"  # Neo4j Browser (HTTP)
      - "7687:7687"  # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/password123
    volumes:
      - neo4j_data:/data
    networks:
      - default
      - course-graph-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 4. AI Worker: Celery 기반 비동기 평가 + AI 총평 생성
  ai-worker:
    build: ./ai
    container_name: ai_worker
    volumes:
      - ./ai:/app
      - ./backend:/backend    # Backend 모델/서비스 접근용
      - /app/.venv
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/my_db
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      BACKEND_PATH: /backend
      PYTHONPATH: /app:/backend
    depends_on:
      - redis
      - db
    networks:
      - default

  # 6. Frontend: React Typescript
  frontend:
    build: ./frontend
    container_name: react_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_URL=http://localhost:8080
    stdin_open: true
    depends_on:
      - backend

volumes:
  postgres_data:
  ollama_data:
  neo4j_data:

networks:
  default:
    driver: bridge
  course-graph-network:
    name: course-graph-network
    driver: bridge

