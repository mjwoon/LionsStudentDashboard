databases:
  - name: lions-db
    plan: free
    databaseName: my_db
    user: user

services:
  # ─────────────────────────────────────────
  # 1. Backend (FastAPI)
  # ─────────────────────────────────────────
  - type: web
    name: lions-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lions-db
          property: connectionString
      - key: REDIS_URL
        sync: false   # Upstash Redis URL 입력: rediss://default:xxxx@xxxx.upstash.io:6379
      - key: NEO4J_URI
        sync: false   # Neo4j Aura URI 입력: neo4j+s://xxxxxxxx.databases.neo4j.io
      - key: NEO4J_USER
        value: neo4j
      - key: NEO4J_PASSWORD
        sync: false   # Neo4j Aura 비밀번호 입력
      - key: CORS_ORIGINS
        sync: false   # 프론트 배포 후 입력: https://lions-frontend.onrender.com
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini

  # ─────────────────────────────────────────
  # 2. Frontend (React → nginx)
  # ─────────────────────────────────────────
  - type: web
    name: lions-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      - key: VITE_API_URL
        sync: false   # 백엔드 배포 후 입력: https://lions-backend.onrender.com

  # ─────────────────────────────────────────
  # 3. AI Worker (Celery)
  # ─────────────────────────────────────────
  - type: worker
    name: lions-ai-worker
    runtime: docker
    dockerfilePath: ./ai/Dockerfile.prod
    dockerContext: .
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lions-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: BACKEND_PATH
        value: /backend
      - key: PYTHONPATH
        value: /app:/backend